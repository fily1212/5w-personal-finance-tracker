<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker</title>
  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <style>
    body { background-color: #f0f2f5; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .stat-card { border: none; border-radius: 12px; }
    .stat-card .card-body { padding: 1.5rem; }
    .stat-icon { font-size: 2rem; opacity: .8; }
    .conto-badge { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    .table-hover tbody tr:hover { background-color: rgba(0,0,0,.03); }
    .badge-entrata { background-color: #d1fae5; color: #065f46; }
    .badge-uscita  { background-color: #fee2e2; color: #991b1b; }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Caricamento...</span>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand">
      <i class="bi bi-wallet2 me-2"></i>Finance Tracker
    </span>
  </div>
</nav>

<main class="container-fluid py-4 px-3 px-md-4">

  <!-- Alert globale -->
  <div id="global-alert" class="alert d-none" role="alert"></div>

  <!-- Dashboard stats -->
  <div class="row g-3 mb-4">
    <div class="col-12 col-sm-4">
      <div class="card stat-card shadow-sm bg-primary text-white">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <div class="text-white-50 small mb-1">Saldo Totale</div>
            <div class="fs-3 fw-bold" id="stat-saldo">—</div>
          </div>
          <i class="bi bi-cash-stack stat-icon text-white-50"></i>
        </div>
      </div>
    </div>
    <div class="col-12 col-sm-4">
      <div class="card stat-card shadow-sm bg-success text-white">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <div class="text-white-50 small mb-1">Entrate del Mese</div>
            <div class="fs-3 fw-bold" id="stat-entrate">—</div>
          </div>
          <i class="bi bi-arrow-down-circle stat-icon text-white-50"></i>
        </div>
      </div>
    </div>
    <div class="col-12 col-sm-4">
      <div class="card stat-card shadow-sm bg-danger text-white">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <div class="text-white-50 small mb-1">Uscite del Mese</div>
            <div class="fs-3 fw-bold" id="stat-uscite">—</div>
          </div>
          <i class="bi bi-arrow-up-circle stat-icon text-white-50"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">

    <!-- Colonna sinistra: Conti + Aggiungi conto -->
    <div class="col-12 col-lg-4">

      <!-- Conti -->
      <div class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold"><i class="bi bi-credit-card me-1"></i> I miei conti</span>
          <button
            class="btn btn-sm btn-outline-primary"
            data-bs-toggle="collapse"
            data-bs-target="#form-nuovo-conto"
            aria-expanded="false"
          >
            <i class="bi bi-plus-lg"></i> Nuovo
          </button>
        </div>

        <!-- Form nuovo conto (collapsible) -->
        <div class="collapse" id="form-nuovo-conto">
          <div class="card-body border-bottom">
            <form id="form-conto" novalidate>
              <div class="mb-2">
                <label for="conto-nome" class="form-label form-label-sm">Nome conto</label>
                <input type="text" class="form-control form-control-sm" id="conto-nome" required placeholder="es. Conto Corrente" />
              </div>
              <div class="mb-2">
                <label for="conto-saldo" class="form-label form-label-sm">Saldo iniziale (€)</label>
                <input type="number" class="form-control form-control-sm" id="conto-saldo" value="0" min="0" step="0.01" />
              </div>
              <div class="mb-3">
                <label for="conto-colore" class="form-label form-label-sm">Colore</label>
                <input type="color" class="form-control form-control-sm form-control-color" id="conto-colore" value="#007bff" />
              </div>
              <button type="submit" class="btn btn-primary btn-sm w-100">Salva conto</button>
            </form>
          </div>
        </div>

        <div class="card-body p-0">
          <ul class="list-group list-group-flush" id="lista-conti">
            <li class="list-group-item text-muted text-center py-3">Caricamento...</li>
          </ul>
        </div>
      </div>

    </div>

    <!-- Colonna destra: Transazioni -->
    <div class="col-12 col-lg-8">

      <!-- Aggiungi transazione -->
      <div class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold"><i class="bi bi-plus-circle me-1"></i> Nuova transazione</span>
        </div>
        <div class="card-body">
          <form id="form-transazione" novalidate>
            <div class="row g-2">
              <div class="col-12 col-sm-6 col-md-3">
                <label for="t-conto" class="form-label form-label-sm">Conto</label>
                <select class="form-select form-select-sm" id="t-conto" required>
                  <option value="">Seleziona...</option>
                </select>
              </div>
              <div class="col-12 col-sm-6 col-md-3">
                <label for="t-categoria" class="form-label form-label-sm">Categoria</label>
                <select class="form-select form-select-sm" id="t-categoria" required>
                  <option value="">Seleziona...</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label for="t-importo" class="form-label form-label-sm">Importo (€)</label>
                <input type="number" class="form-control form-control-sm" id="t-importo" min="0.01" step="0.01" required placeholder="0.00" />
              </div>
              <div class="col-6 col-md-2">
                <label for="t-data" class="form-label form-label-sm">Data</label>
                <input type="date" class="form-control form-control-sm" id="t-data" required />
              </div>
              <div class="col-12 col-md-2">
                <label for="t-descrizione" class="form-label form-label-sm">Descrizione</label>
                <input type="text" class="form-control form-control-sm" id="t-descrizione" placeholder="Opzionale" />
              </div>
            </div>
            <div class="mt-3 text-end">
              <button type="submit" class="btn btn-success btn-sm px-4">
                <i class="bi bi-check-lg me-1"></i>Aggiungi
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Storico transazioni -->
      <div class="card shadow-sm">
        <div class="card-header">
          <span class="fw-semibold"><i class="bi bi-clock-history me-1"></i> Storico transazioni</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>Data</th>
                  <th>Descrizione</th>
                  <th>Categoria</th>
                  <th>Conto</th>
                  <th class="text-end">Importo</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody-transazioni">
                <tr>
                  <td colspan="6" class="text-center text-muted py-3">Caricamento...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Bootstrap 5 JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqTbQIHCYZFW30lH8Qj7QSu9Dz"
  crossorigin="anonymous"
></script>
<script src="js/app.js"></script>
</body>
</html>
